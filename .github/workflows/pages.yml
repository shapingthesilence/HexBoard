name: Deploy Web App to GitHub Pages

on:
  push:
    branches:
      - main
      - development
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build main and development pages
        run: |
          set -euo pipefail

          rm -rf pages-dist
          mkdir -p pages-dist

          git fetch origin main development

          git worktree add --detach ../hexboard-pages-main origin/main
          (
            cd ../hexboard-pages-main/web
            npm ci
            npm test
            npm run build -- --mode github-pages-main --base=/HexBoard/
          )
          cp -R ../hexboard-pages-main/web/dist/. pages-dist/

          git worktree add --detach ../hexboard-pages-development origin/development
          (
            cd ../hexboard-pages-development/web
            npm ci
            npm test
            npm run build -- --mode github-pages-development --base=/HexBoard/development/
          )
          mkdir -p pages-dist/development
          cp -R ../hexboard-pages-development/web/dist/. pages-dist/development/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
